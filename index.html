<!DOCTYPE html>
<html>
<head>
    <title>Team Design Review Portal</title>
    <style>
        /* This makes the page layout look clean and spaced out */
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .review-section {
            background-color: white;
            margin-bottom: 50px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* This styles the window showing your HTML files */
        iframe {
            width: 100%;
            height: 600px; /* Adjust this number to make the windows taller or shorter */
            border: 2px solid #ddd;
            border-radius: 4px;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <h1>Internal Design Review Portal</h1>
    <p>Scroll down to review all the HTML page designs. You can interact with each page inside its window!</p>

    <!-- FIRST HTML PAGE -->
    <div class="review-section">
        <h2>1. Attempt 1</h2>
        <iframe src="test-1.html"></iframe>
    </div>

    <!-- SECOND HTML PAGE -->
    <div class="review-section">
        <h2>2. Attempt 2</h2>
        <iframe src="test-2.html"></iframe>
    </div>

    <!-- THIRD HTML PAGE -->
    <div class="review-section">
        <h2>2. Attempt 3</h2>
        <iframe src="test-3.html"></iframe>
    </div>

</body>
</html>
